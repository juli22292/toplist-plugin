# TopList Update-Prüfung
# BITTE ÄNDERE HIER REIN GARNICHTS, WENN GEÄNDERT WIRD = PLUGIN WIRD KAPUTT GEHEN!
# NUR "TRUE / FALSE" VALUES ÄNDERN!

config-version: 1

enabled: true
check-on-startup: true
check-on-join: true
check-interval-seconds: 7200
notify-console: true
notify-permission: "topliste.admin"
timeout-millis: 5000

prefix: "&8[&aTopList&8] "
latest-url: "https://raw.githubusercontent.com/juli22292/toplist-plugin/main/latest.txt"
download-url: "https://github.com/juli22292/toplist-plugin/releases/latest"

messages:
  checking: "Suche nach TopList Updates..."
  already-running: "Es läuft bereits eine TopList Update-Prüfung."
  disabled: "Die TopList Update-Prüfung ist deaktiviert."
  connection-failed: "Es sieht so aus als ob du eine Instabile Internetverbindung hast..."
  no-update: "Keine Neuere Version gefunden, du bist auf der aktuellsten!"
  update-available:
    - "{prefix}&7Eine neue Version von TopList ist verfügbar!"
    - "{prefix}&7Aktuell nutzt du die Version &c{version}&7."
    - "{prefix}&7Es wird empfohlen, die neueste &a{neue_version} &7Version von diesen Quellen zu installieren:&r"
    - "&8<strikeout>-------------------------------------------------&r"
    - "&f-> &7Installiert&8: {version}"
    - "&f-> &7Neueste&8: {neueste_version}"
    - "&f-> &7Download&8: {downloads}"
    - "&8<strikeout>-------------------------------------------------&r"
